<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slipper Slopes and Leaders Ladders</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            position: relative;
        }
        .container {
            position: relative;
            margin: 30px;
        }
        .backgroundLayer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.7;
            z-index: -1;
        }
        .dynamic-div {
            background-color: lightblue;
            padding: 20px;
            margin: 10px;
            border: 1px solid blue;
            transition: opacity 2s;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            max-width: 400px;
            text-align: left;
            border-radius: 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        .dynamic-div.hidden {
            opacity: 0;
        }
        #board {
            display: inline-block;
            margin-top: 20px;
            position: relative;
        }
        .cell {
            width: 35px;
            height: 35px;
            border: 1px solid black;
            display: inline-block;
            background-color: rgba(255, 255, 153, 0.8);
            border-radius: 10px;
            margin: 1px;
            font-size: 11px;
            line-height: 35px;
            vertical-align: middle;
        }
        .player {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid black;
            box-sizing: border-box;
            z-index: 1;
            border-radius: 50%;
        }
        #player1 { background-color: rgba(255, 0, 0, 0.8); }
        #player2 { background-color: rgba(0, 0, 255, 0.8); }
        #player3 { background-color: rgba(0, 200, 0, 0.8); }
        #player4 { background-color: rgba(255, 165, 0, 0.8); }
        #player5 { background-color: rgba(255, 0, 255, 0.8); }
        #player6 { background-color: rgba(0, 255, 255, 0.8); }
        #status {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
            color: #333;
        }
        #turnInfo {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        #debug {
            display: none;
            margin-top: 20px;
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        .player-legend {
            margin-top: 10px;
            font-size: 13px;
        }
        .legend-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #333;
            margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="backgroundLayerDiv" class="backgroundLayer">
            <img src="https://srinimkasturi.github.io/ui4io/Images/EyeOnPeace.png" height="100px" alt="Background">
        </div>
        <h3>Slipper Slopes and Leaders Ladders!</h3>
        <p>
            1. Select:
            <select id="playerCount">
                <option value="2">2 Players</option>
                <option value="3">3 Players</option>
                <option value="4">4 Players</option>
                <option value="5">5 Players</option>
                <option value="6">6 Players</option>
            </select>
            <button id="startGame">2. Start</button>
            <button id="rollDice" disabled>3. Roll Dice</button>
        </p>
        <div id="turnInfo"></div>
        <div id="status"></div>
        <div id="playerLegend" class="player-legend"></div>
        <p>
            <div id="board"></div>
        </p>
        <p>
            <button id="toggleDebug">Toggle Debug</button>
            <div id="debug"></div>
        </p>
    </div>

    <script>
        // Dissolve background layer after 10 seconds
        setTimeout(function() {
            var bg = document.getElementById("backgroundLayerDiv");
            if (bg) bg.style.display = "none";
        }, 10000);

        function createAndDissolveDiv(content) {
            var newDiv = document.createElement("div");
            newDiv.className = "dynamic-div";
            newDiv.innerHTML = content;
            document.body.appendChild(newDiv);
            setTimeout(function() {
                newDiv.classList.add("hidden");
                setTimeout(function() {
                    newDiv.remove();
                }, 2000);
            }, 6000);
        }

        function rollDice() {
            return Math.floor(Math.random() * 6) + 1;
        }
        function rollDiceForLadderRead() {
            return Math.floor(Math.random() * 3);
        }
        function rollDiceForSlopeRead() {
            return Math.floor(Math.random() * 2);
        }

        function isPrime(number) {
            if (number <= 1) return false;
            if (number <= 3) return true;
            if (number % 2 === 0 || number % 3 === 0) return false;
            var i = 5;
            while (i * i <= number) {
                if (number % i === 0 || number % (i + 2) === 0) return false;
                i += 6;
            }
            return true;
        }

        function getNextPrime(number) {
            var next = number + 1;
            while (!isPrime(next)) next++;
            return next;
        }

        function getPreviousPrime(number) {
            var prev = number - 1;
            while (prev > 1 && !isPrime(prev)) prev--;
            return prev;
        }

        // position 0 = cell 108 (top), position 107 = cell 1 (start)
        function movePlayer(player, diceValue) {
            var oldPosition = player.position;
            var newPosition = player.position - diceValue;

            if (newPosition < 0) {
                return { oldPosition: oldPosition, newPosition: oldPosition, message: null, cantMove: true };
            }

            player.position = newPosition;

            if (newPosition === 0) {
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Player " + player.id + " reached cell 108 and WINS!", win: true };
            }

            var cellValue = newPosition + 1;

            // Slipper Slopes and Leaders Ladders based on prime numbers
            // Near top (cells 54-108): small slope back, big ladder forward
            // Middle (cells 27-53): medium slope back, medium ladder forward
            // Near bottom (cells 1-26): big slope back, small ladder forward
            if (isPrime(cellValue) && cellValue >= 54) {
                var nextPrime = getNextPrime(cellValue);
                if (nextPrime - 1 <= 107) {
                    player.position = nextPrime - 1;
                }
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Slipper Slope! Slid back from cell " + cellValue + " to cell " + (108 - player.position), popUpContent: "You landed on a Slipper Slope. You slid a bit backward!<br><br>" + slopeText[rollDiceForSlopeRead()] };
            } else if (isPrime(newPosition) && newPosition >= 54) {
                var p1 = getPreviousPrime(newPosition);
                var p2 = (p1 > 2) ? getPreviousPrime(p1) : p1;
                var p3 = (p2 > 2) ? getPreviousPrime(p2) : p2;
                var targetPos = Math.max(0, p3 - 3);
                player.position = targetPos;
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Leader Ladder! Jumped forward from cell " + (newPosition + 1) + " to cell " + (108 - player.position), popUpContent: "You landed on a Leader Ladder. You jumped way forward!<br><br>" + ladderText[rollDiceForLadderRead()] };
            } else if (isPrime(cellValue) && cellValue >= 27 && cellValue < 54) {
                var np1 = getNextPrime(cellValue);
                var np2 = getNextPrime(np1);
                if (np2 - 1 <= 107) {
                    player.position = np2 - 1;
                }
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Slipper Slope! Slid back from cell " + cellValue + " to cell " + (108 - player.position), popUpContent: "You landed on a Slipper Slope. You slid backward!<br><br>" + slopeText[rollDiceForSlopeRead()] };
            } else if (isPrime(newPosition) && newPosition >= 27 && newPosition < 54) {
                var pp1 = getPreviousPrime(newPosition);
                var pp2 = (pp1 > 2) ? getPreviousPrime(pp1) : pp1;
                var targetPos2 = Math.max(0, pp2 - 2);
                player.position = targetPos2;
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Leader Ladder! Jumped forward from cell " + (newPosition + 1) + " to cell " + (108 - player.position), popUpContent: "You landed on a Leader Ladder. You jumped quite a bit forward!<br><br>" + ladderText[rollDiceForLadderRead()] };
            } else if (isPrime(cellValue)) {
                var nnp1 = getNextPrime(cellValue);
                var nnp2 = getNextPrime(nnp1);
                var nnp3 = getNextPrime(nnp2);
                if (nnp3 - 1 <= 107) {
                    player.position = nnp3 - 1;
                }
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Slipper Slope! Slid back from cell " + cellValue + " to cell " + (108 - player.position), popUpContent: "You landed on a Slipper Slope. You slid way back!<br><br>" + slopeText[rollDiceForSlopeRead()] };
            } else if (isPrime(newPosition)) {
                var prevPrime = getPreviousPrime(newPosition);
                player.position = Math.max(0, prevPrime);
                return { oldPosition: oldPosition, newPosition: newPosition, message: "Leader Ladder! Jumped forward from cell " + (newPosition + 1) + " to cell " + (108 - player.position), popUpContent: "You landed on a Leader Ladder. You jumped forward!<br><br>" + ladderText[rollDiceForLadderRead()] };
            } else {
                return { oldPosition: oldPosition, newPosition: newPosition };
            }
        }

        function updatePlayerPosition(player) {
            var playerElement = document.getElementById("player" + player.id);
            if (!playerElement) return;
            var posInfo = getPositionFromIndex(player.position);
            var row = posInfo[0];
            var column = posInfo[1];
            var boardEl = document.getElementById("board");
            var boardWidth = boardEl.offsetWidth;
            var cellWidth = boardWidth / board[0].length;
            var leftPosition = (column * cellWidth) + (cellWidth / 2) - (playerElement.offsetWidth / 2);
            var topPosition = (row * cellWidth) + (cellWidth / 2) - (playerElement.offsetHeight / 2);
            playerElement.style.left = leftPosition + "px";
            playerElement.style.top = topPosition + "px";
        }

        function updateDebugInfo(moveResult, diceValue) {
            if (!moveResult) return;
            var debugElement = document.getElementById("debug");
            var oldPosInfo = getPositionFromIndex(moveResult.oldPosition);
            var newPosInfo = getPositionFromIndex(moveResult.newPosition);
            var primeMoveCount = Math.abs(moveResult.oldPosition - moveResult.newPosition);
            debugElement.innerHTML =
                "<p><strong>Old Position:</strong> Row " + oldPosInfo[0] + ", Column " + oldPosInfo[1] + ", Cell " + oldPosInfo[2] + "</p>" +
                "<p><strong>Dice Value:</strong> " + diceValue + "</p>" +
                "<p><strong>New Position:</strong> Row " + newPosInfo[0] + ", Column " + newPosInfo[1] + ", Cell " + newPosInfo[2] + "</p>" +
                (moveResult.message ? "<p><strong>Event:</strong> " + moveResult.message + "</p>" : "") +
                "<p><strong>Steps moved:</strong> " + primeMoveCount + "</p>";
        }

        function getPositionFromIndex(position) {
            var row = Math.floor(position / board[0].length);
            var column;
            if (row % 2 === 0) {
                column = position % board[0].length;
            } else {
                column = board[0].length - 1 - (position % board[0].length);
            }
            return [row, column, board[row][column]];
        }

        var boardElement = document.getElementById("board");
        var board = [
            [108, 107, 106, 105, 104, 103, 102, 101, 100],
            [ 91,  92,  93,  94,  95,  96,  97,  98,  99],
            [ 90,  89,  88,  87,  86,  85,  84,  83,  82],
            [ 73,  74,  75,  76,  77,  78,  79,  80,  81],
            [ 72,  71,  70,  69,  68,  67,  66,  65,  64],
            [ 55,  56,  57,  58,  59,  60,  61,  62,  63],
            [ 54,  53,  52,  51,  50,  49,  48,  47,  46],
            [ 37,  38,  39,  40,  41,  42,  43,  44,  45],
            [ 36,  35,  34,  33,  32,  31,  30,  29,  28],
            [ 19,  20,  21,  22,  23,  24,  25,  26,  27],
            [ 18,  17,  16,  15,  14,  13,  12,  11,  10],
            [  1,   2,   3,   4,   5,   6,   7,   8,   9],
        ];

        var cellColors = [
            "rgba(255, 255, 153, 0.8)",
            "rgba(153, 255, 153, 0.8)",
            "rgba(153, 204, 255, 0.8)",
            "rgba(255, 153, 255, 0.8)",
            "rgba(255, 204, 153, 0.8)",
            "rgba(204, 153, 255, 0.8)"
        ];

        var ladderText = [
            "Matsya Avtaar, 1 of 5: When the universe was going to be submerged in the biggest of all rains, Lord Vishnu appeared as a humongous fish, Matsya.",
            "Matsya Avtaar, 2 of 5: During the great universal deluge, Matsya rescued all forms of life that would listen to his plan and once the rains were gone, he gave them a brand new world.",
            "Matsya Avtaar, 3 of 5: To save the world, Matsya asked Satyavrata to join his team. Satyavrata built a huge ship and got all the living things onto the ship, which was rescued by Matsya during the universal deluge.",
        ];
        var slopeText = [
            "Matsya Avtaar, 4 of 5: While Satyavrata and Matsya were planning to save life during the great universal deluge, Hayagrivah was busy stealing all the knowledge.",
            "Matsya Avtaar, 5 of 5: While the universal life rescue operation was under way, Vishnu saw Hayagrivah stealing knowledge and asked him repeatedly to give the knowledge back to the world. When he refused, Vishnu as Matsya vanquished him, and gave the knowledge back to the world full of new life.",
        ];

        var playerColors = [
            "rgba(255, 0, 0, 0.8)",
            "rgba(0, 0, 255, 0.8)",
            "rgba(0, 200, 0, 0.8)",
            "rgba(255, 165, 0, 0.8)",
            "rgba(255, 0, 255, 0.8)",
            "rgba(0, 255, 255, 0.8)"
        ];
        var playerNames = ["Red", "Blue", "Green", "Orange", "Magenta", "Cyan"];

        var colorIndex = 0;
        for (var i = 0; i < board.length; i++) {
            for (var j = 0; j < board[i].length; j++) {
                var cell = document.createElement("div");
                cell.classList.add("cell");
                cell.textContent = board[i][j];
                cell.style.backgroundColor = cellColors[colorIndex];
                colorIndex = (colorIndex + 1) % cellColors.length;
                cell.id = "cell-" + i + "-" + j;
                boardElement.appendChild(cell);
            }
            boardElement.appendChild(document.createElement("br"));
        }

        var players = [];

        function createPlayers(count) {
            document.querySelectorAll(".player").forEach(function(el) { el.remove(); });
            players = [];
            for (var i = 1; i <= count; i++) {
                players.push({ id: i, position: 107 });
            }
            players.forEach(function(player) {
                var playerElement = document.createElement("div");
                playerElement.classList.add("player");
                playerElement.id = "player" + player.id;
                playerElement.title = "Player " + player.id + " (" + playerNames[player.id - 1] + ")";
                boardElement.appendChild(playerElement);
            });
            var legend = document.getElementById("playerLegend");
            legend.innerHTML = players.map(function(p) {
                return '<span style="margin:0 8px"><span class="legend-dot" style="background:' + playerColors[p.id-1] + '"></span>Player ' + p.id + ' (' + playerNames[p.id-1] + ')</span>';
            }).join("");
        }

        document.getElementById("startGame").addEventListener("click", function() {
            var playerCount = parseInt(document.getElementById("playerCount").value);
            createPlayers(playerCount);
            document.getElementById("rollDice").disabled = false;
            document.getElementById("startGame").disabled = true;
            players.forEach(function(player) { updatePlayerPosition(player); });
            currentPlayerIndex = 0;
            updateTurnInfo();
            document.getElementById("status").textContent = "Game started! Player 1 goes first.";
        });

        var currentPlayerIndex = 0;

        function updateTurnInfo() {
            if (players.length === 0) return;
            var p = players[currentPlayerIndex];
            var cellValue = 108 - p.position;
            document.getElementById("turnInfo").textContent = "Player " + p.id + "'s turn (" + playerNames[p.id - 1] + ") - currently at cell " + cellValue;
        }

        document.getElementById("rollDice").addEventListener("click", function() {
            var currentPlayer = players[currentPlayerIndex];
            var diceValue = rollDice();
            var moveResult = movePlayer(currentPlayer, diceValue);

            if (moveResult && moveResult.cantMove) {
                document.getElementById("status").textContent = "Player " + currentPlayer.id + " rolled a " + diceValue + " but cannot move - too close to cell 108!";
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                updateTurnInfo();
                return;
            }

            updatePlayerPosition(currentPlayer);
            updateDebugInfo(moveResult, diceValue);

            if (moveResult && moveResult.win) {
                document.getElementById("status").textContent = "Player " + currentPlayer.id + " (" + playerNames[currentPlayer.id - 1] + ") rolled a " + diceValue + " and reached cell 108 - WINNER!";
                document.getElementById("rollDice").disabled = true;
                document.getElementById("turnInfo").textContent = "Game over! Player " + currentPlayer.id + " wins!";
                return;
            }

            var statusMsg = "Player " + currentPlayer.id + " rolled a " + diceValue + ".";
            if (moveResult && moveResult.message) {
                statusMsg += " " + moveResult.message;
            } else if (moveResult) {
                var from = 108 - moveResult.oldPosition;
                var to = 108 - moveResult.newPosition;
                statusMsg += " Moved from cell " + from + " to cell " + to + ".";
            }
            document.getElementById("status").textContent = statusMsg;

            if (moveResult && moveResult.popUpContent) {
                createAndDissolveDiv(moveResult.popUpContent);
            }

            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            updateTurnInfo();
        });

        document.getElementById("toggleDebug").addEventListener("click", function() {
            var debugElement = document.getElementById("debug");
            debugElement.style.display = debugElement.style.display === "none" ? "block" : "none";
        });
    </script>
</body>
</html>
